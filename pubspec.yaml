name: peereess
description: "Your shopping app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  provider: ^6.1.5+1
  cached_network_image: ^3.4.1
  iconsax_plus: ^1.0.0
  appwrite: ^20.3.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.18.1
  shared_preferences: ^2.5.3
  file_picker: ^10.3.3
  image_picker: ^1.2.0
  uuid: ^4.3.3
  flutter_staggered_grid_view: ^0.7.0
  fl_chart: ^0.70.0
  http: ^1.5.0
  webview_flutter: ^4.13.0
  flutter_slidable: ^3.1.0
  connectivity_plus: ^4.0.1
  collection: ^1.19.0
  permission_handler: ^12.0.1
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.0.0
 

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: "^0.11.0"
  collection: ^1.18.0

flutter_icons:

  android: true
  ios: true
 
  image_path: "assets/images/peereessi.png"
  remove_alpha_ios: true

flutter:
  assets:
    - assets/images/

  uses-material-design: true

 